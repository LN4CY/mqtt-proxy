name: Create Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          pyinstaller --name mqtt-proxy-windows-amd64 --onefile --console --runtime-tmpdir "%LOCALAPPDATA%\Temp" mqtt-proxy.py

      - name: Upload Artifact for Release
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/mqtt-proxy-windows-amd64.exe

  release:
    needs: build-windows-exe
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: release-assets/

      - name: Extract Release Notes
        shell: bash
        run: |
          python3 -c "
          import os
          version = os.environ.get('GITHUB_REF_NAME', '').replace('v', '')
          notes_path = 'RELEASE_NOTES.md'
          if not os.path.exists(notes_path):
              exit(0)
          with open(notes_path, 'r', encoding='utf-8') as f:
              lines = f.readlines()
          header = f'# Release v{version}'
          start = -1
          for i, l in enumerate(lines):
              if l.strip() == header:
                  start = i
                  break
          if start == -1:
              exit(0)
          notes = []
          for i in range(start + 1, len(lines)):
              if lines[i].startswith('# Release v'):
                  break
              notes.append(lines[i])
          with open('latest_notes.md', 'w', encoding='utf-8') as f:
              f.write(''.join(notes).strip())
          "

      - name: Create or Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use gh CLI for atomic creation to satisfy "Immutable Release" rules
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists. Uploading asset..."
            gh release upload "$GITHUB_REF_NAME" release-assets/mqtt-proxy-windows-amd64.exe --clobber
          else
            echo "Creating new release $GITHUB_REF_NAME..."
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file latest_notes.md \
              release-assets/mqtt-proxy-windows-amd64.exe
          fi
